  #   ports:
  #     - "3100:3100"
  #   depends_on:
  #     - redis-master
  #     - redis-sentinel-1
  #     - redis-sentinel-2
  #     - redis-sentinel-3
  #     - kafka-1
  #     - kafka-2
  #     - kafka-3
  #   environment:
  #     - MONGODB_URI=mongodb://mongodb:27017
  #     - MONGODB_DB_NAME=orders_db
  #     - REDIS_SENTINELS=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
  #     - DOCKER_ENV=true
  #   networks:
  #     - app-network

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  kafka1-data:
  kafka2-data:
  kafka3-data:
  mongo-data:
  redis-master-data: